<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Gleam — Profile settings</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,500;1,400;1,500&family=Inter:wght@300;400;500&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
:root {
  --bg: #F7F4EF;
  --bg-mid: #EDE8E1;
  --shell: #1C1917;
  --text: #1C1917;
  --muted: #6B6560;
  --border: rgba(28,25,23,0.12);
  --accent: #C9A99A;
  --accent-dk: #A07868;
  --serif: 'Cormorant Garamond', Georgia, serif;
  --sans: 'Inter', system-ui, sans-serif;
}
body { min-height: 100vh; font-family: var(--sans); background: var(--bg); color: var(--text); }
nav {
  height: 60px;
  border-bottom: 1px solid var(--border);
  background: rgba(247,244,239,0.92);
  backdrop-filter: blur(12px);
  display: flex;
  align-items: center;
  padding: 0 40px;
}
.nav-inner {
  width: 100%;
  max-width: 960px;
  margin: 0 auto;
  display: flex;
  justify-content: space-between;
  align-items: center;
}
.nav-logo {
  font-family: var(--serif);
  font-size: 21px;
  font-weight: 500;
  color: var(--text);
  text-decoration: none;
}
.nav-link {
  color: var(--muted);
  text-decoration: none;
  font-size: 13px;
}
.nav-link:hover { color: var(--text); }
main {
  max-width: 960px;
  margin: 0 auto;
  padding: 56px 40px 80px;
}
.page-kicker {
  color: var(--muted);
  font-size: 13px;
  margin-bottom: 6px;
}
h1 {
  font-family: var(--serif);
  font-size: 42px;
  font-weight: 500;
  line-height: 1.1;
  margin-bottom: 36px;
}
h1 span { color: var(--accent-dk); font-style: italic; }
.settings-panel {
  max-width: 620px;
  background: #fff;
  border: 1px solid var(--border);
  border-radius: 10px;
  padding: 28px;
  box-shadow: 0 12px 36px rgba(28,25,23,0.06);
}
.avatar-row {
  display: flex;
  align-items: center;
  gap: 18px;
  margin-bottom: 26px;
}
.avatar-preview {
  width: 72px;
  height: 72px;
  border-radius: 50%;
  background: var(--accent);
  color: white;
  font-family: var(--serif);
  font-size: 28px;
  display: flex;
  align-items: center;
  justify-content: center;
  background-size: cover;
  background-position: center;
  flex: 0 0 auto;
}
.avatar-copy {
  color: var(--muted);
  font-size: 13px;
  line-height: 1.5;
  margin-top: 6px;
}
.file-label {
  display: inline-block;
  background: var(--bg-mid);
  border-radius: 7px;
  padding: 9px 14px;
  color: var(--text);
  font-size: 13px;
  cursor: pointer;
}
.file-label input { display: none; }
.field { margin-bottom: 18px; }
.field label {
  display: block;
  margin-bottom: 7px;
  color: var(--muted);
  font-size: 11px;
  font-weight: 500;
  letter-spacing: 0.04em;
  text-transform: uppercase;
}
.field input {
  width: 100%;
  border: 1px solid var(--border);
  border-radius: 7px;
  padding: 11px 12px;
  background: var(--bg);
  color: var(--text);
  font: 14px var(--sans);
  outline: none;
}
.field input:focus {
  border-color: var(--accent);
  box-shadow: 0 0 0 3px rgba(201,169,154,0.15);
}
.field input[readonly] {
  color: var(--muted);
  background: var(--bg-mid);
}
.actions {
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 12px;
  margin-top: 24px;
}
.btn-primary, .btn-ghost {
  border: 0;
  border-radius: 7px;
  padding: 11px 18px;
  cursor: pointer;
  font: 500 14px var(--sans);
}
.btn-primary { background: var(--shell); color: var(--bg); }
.btn-primary:hover { background: #2C2925; }
.btn-ghost { background: transparent; color: var(--muted); }
.btn-ghost:hover { color: var(--text); }
#profile-message {
  min-height: 20px;
  margin-top: 18px;
  color: var(--muted);
  font-size: 13px;
  line-height: 1.5;
}
@media (max-width: 640px) {
  nav { padding: 0 20px; }
  main { padding: 40px 20px 64px; }
  h1 { font-size: 34px; }
  .settings-panel { padding: 22px; }
  .avatar-row { align-items: flex-start; }
}
</style>
  <script>
    window.va = window.va || function () { (window.vaq = window.vaq || []).push(arguments); };
  </script>
  <script defer src="/_vercel/insights/script.js"></script>
</head>
<body>
<nav>
  <div class="nav-inner">
    <a href="index.html" class="nav-logo">Gleam</a>
    <a href="boards.html" class="nav-link">My boards</a>
  </div>
</nav>
<main>
  <p class="page-kicker">Account</p>
  <h1>Your <span>profile.</span></h1>
  <section class="settings-panel">
    <form id="profile-form">
      <div class="avatar-row">
        <div class="avatar-preview" id="avatar-preview">G</div>
        <div>
          <label class="file-label">
            Change profile picture
            <input id="avatar-input" type="file" accept="image/png,image/jpeg,image/webp">
          </label>
          <p class="avatar-copy">Used in your Gleam account navigation and future shared boards.</p>
        </div>
      </div>
      <div class="field">
        <label for="username">Username</label>
        <input id="username" type="text" maxlength="40" placeholder="Emma">
      </div>
      <div class="field">
        <label for="email">Email</label>
        <input id="email" type="email" readonly>
      </div>
      <div class="actions">
        <button class="btn-ghost" id="sign-out" type="button">Sign out</button>
        <button class="btn-primary" id="save-profile" type="submit">Save profile</button>
      </div>
    </form>
    <p id="profile-message"></p>
  </section>
</main>
<script type="module" src="profile.js"></script>
</body>
</html>
