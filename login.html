<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Gleam — Sign in</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,500;1,400;1,500&family=Inter:wght@300;400;500&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{--bg:#F7F4EF;--bg-mid:#EDE8E1;--shell:#1C1917;--text:#1C1917;--muted:#6B6560;--border:rgba(28,25,23,0.12);--accent:#C9A99A;--accent-dk:#A07868;--serif:'Cormorant Garamond',Georgia,serif;--sans:'Inter',system-ui,sans-serif}
html,body{height:100%;overflow:hidden}
body{font-family:var(--sans);background:var(--shell);display:flex;align-items:center;justify-content:center;position:relative}
/* full-bleed collage behind everything */
.collage-bg{position:absolute;inset:0;overflow:hidden}
.cc{position:absolute;border-radius:3px;box-shadow:0 6px 28px rgba(0,0,0,0.35)}
.cc1{width:24%;height:42%;top:4%;left:3%;background:#C9A99A;transform:rotate(-3deg);animation:df1 9s ease-in-out infinite}
.cc2{width:18%;height:36%;top:3%;left:24%;background:#B8C4BB;transform:rotate(2deg);animation:df2 11s ease-in-out infinite 1s}
.cc3{width:16%;height:30%;top:46%;left:2%;background:#D4C5B5;transform:rotate(1.5deg);animation:df3 8s ease-in-out infinite .5s}
.cc4{width:20%;height:24%;top:50%;left:20%;background:#1C1917;transform:rotate(-1deg);animation:df1 10s ease-in-out infinite 2s;display:flex;align-items:center;justify-content:center}
.cc4 p{font-family:var(--serif);font-style:italic;font-size:11px;color:rgba(247,244,239,.7);text-align:center;line-height:1.4;padding:8px}
.cc5{width:18%;height:38%;top:5%;right:3%;background:#A8B4A8;transform:rotate(2.5deg);animation:df2 12s ease-in-out infinite 1.5s}
.cc6{width:22%;height:28%;bottom:8%;right:6%;background:#E8DDD4;transform:rotate(-1.5deg);animation:df3 9s ease-in-out infinite .8s}
.cc7{width:14%;height:24%;top:46%;right:24%;background:#C4B5A8;transform:rotate(1deg);animation:df1 13s ease-in-out infinite 3s}
.cc8{width:20%;height:36%;bottom:5%;left:38%;background:#C9A99A;opacity:.7;transform:rotate(-2deg);animation:df2 10s ease-in-out infinite 2s}
@keyframes df1{0%,100%{transform:rotate(-3deg) translateY(0)}50%{transform:rotate(-2.5deg) translateY(-8px)}}
@keyframes df2{0%,100%{transform:rotate(2deg) translateY(0)}50%{transform:rotate(2.5deg) translateY(-10px)}}
@keyframes df3{0%,100%{transform:rotate(1.5deg) translateY(0)}50%{transform:rotate(1deg) translateY(-6px)}}
@media(prefers-reduced-motion:reduce){.cc{animation:none!important}}
/* dark overlay so card pops */
.collage-bg::after{content:'';position:absolute;inset:0;background:rgba(28,25,23,0.55)}
/* logo */
.top-logo{position:absolute;top:28px;left:36px;z-index:10;font-family:var(--serif);font-size:22px;font-weight:500;color:rgba(247,244,239,.9);text-decoration:none}
/* the card */
.card{position:relative;z-index:5;background:var(--bg);border-radius:16px;padding:40px 44px;width:420px;box-shadow:0 24px 80px rgba(0,0,0,.45)}
</style>
<!-- shared form styles injected below -->
<style>
.form-headline{font-family:var(--serif);font-size:30px;font-weight:500;color:var(--text);margin-bottom:6px}
.form-sub{font-size:14px;color:var(--muted);margin-bottom:28px;font-weight:300;line-height:1.5}
.form-tabs{display:flex;gap:0;border-bottom:1px solid var(--border);margin-bottom:24px}
.form-tab{font-size:14px;color:var(--muted);padding:0 0 10px;margin-right:20px;cursor:pointer;border-bottom:2px solid transparent;margin-bottom:-1px;transition:color .2s,border-color .2s;background:none;border-top:none;border-left:none;border-right:none;font-family:var(--sans)}
.form-tab.active{color:var(--text);border-bottom-color:var(--accent-dk);font-weight:500}
.field{margin-bottom:14px}
.field label{display:block;font-size:11px;font-weight:500;color:var(--muted);margin-bottom:6px;letter-spacing:.04em;text-transform:uppercase}
.field input{width:100%;padding:10px 13px;border:1px solid var(--border);border-radius:7px;font-family:var(--sans);font-size:14px;color:var(--text);background:var(--bg);outline:none;transition:border-color .15s,box-shadow .15s;-webkit-appearance:none}
.field input:focus{border-color:var(--accent);box-shadow:0 0 0 3px rgba(201,169,154,.15)}
.field input::placeholder{color:rgba(28,25,23,.3)}
.field-error{font-size:12px;color:#C0624A;margin-top:4px;display:none}
.field.has-error input{border-color:#C0624A}
.field.has-error .field-error{display:block}
.forgot{text-align:right;margin-bottom:16px;margin-top:-8px}
.forgot a{font-size:12px;color:var(--muted);text-decoration:none}
.btn-submit{width:100%;padding:12px;background:var(--shell);color:var(--bg);border:none;border-radius:7px;font-family:var(--sans);font-size:14px;font-weight:500;cursor:pointer;transition:background .2s}
.btn-submit:hover{background:#2C2925}
.divider{display:flex;align-items:center;gap:10px;margin:16px 0}
.divider::before,.divider::after{content:'';flex:1;height:1px;background:var(--border)}
.divider span{font-size:12px;color:var(--muted);white-space:nowrap;font-weight:300}
.btn-social{width:100%;padding:10px;background:var(--bg);color:var(--text);border:1px solid var(--border);border-radius:7px;font-family:var(--sans);font-size:13px;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:8px;margin-bottom:8px;transition:background .15s}
.btn-social:hover{background:var(--bg-mid)}
.btn-social svg{width:15px;height:15px}
.guest-link{display:block;text-align:center;margin-top:14px;font-size:13px;color:var(--muted);text-decoration:none;font-weight:300}
.guest-link:hover{color:var(--text)}
.form-terms{margin-top:12px;font-size:11px;color:rgba(28,25,23,.35);text-align:center;line-height:1.5}
.form-terms a{color:var(--muted);text-decoration:underline}
.signup-only{display:none}
</style>
  <script>
    window.va = window.va || function () { (window.vaq = window.vaq || []).push(arguments); };
  </script>
  <script defer src="/_vercel/insights/script.js"></script>
</head>
<body>
<div class="collage-bg">
  <div class="cc cc1"></div><div class="cc cc2"></div><div class="cc cc3"></div>
  <div class="cc cc4"><p>all mood.<br>no manual.</p></div>
  <div class="cc cc5"></div><div class="cc cc6"></div><div class="cc cc7"></div><div class="cc cc8"></div>
</div>
<a href="index.html" class="top-logo">Gleam</a>
<div class="card">
  <h1 class="form-headline" id="form-title">Welcome back.</h1>
  <p class="form-sub" id="form-sub">Sign in to your boards — they've been waiting.</p>
  <div class="form-tabs">
    <button class="form-tab active" id="tab-signin" type="button" onclick="setMode('signin')">Sign in</button>
    <button class="form-tab" id="tab-signup" type="button" onclick="setMode('signup')">Create account</button>
  </div>
  <button class="btn-social"><svg viewBox="0 0 24 24" fill="none"><path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z" fill="#4285F4"/><path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"/><path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l3.66-2.84z" fill="#FBBC05"/><path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" fill="#EA4335"/></svg>Continue with Google</button>
  <div class="divider"><span>or continue with email</span></div>
  <form id="auth-form">
    <div class="field signup-only"><label>Name</label><input type="text" id="name" placeholder="Emma"></div>
    <div class="field" id="field-email"><label>Email</label><input type="email" id="email" placeholder="you@email.com"><div class="field-error">Please enter a valid email.</div></div>
    <div class="field" id="field-password"><label>Password</label><input type="password" id="password" placeholder="••••••••"><div class="field-error">At least 8 characters.</div></div>
    <div class="field signup-only" id="field-confirm"><label>Confirm password</label><input type="password" id="confirm" placeholder="••••••••"><div class="field-error">Passwords don't match.</div></div>
    <div class="forgot signin-only"><a href="#">Forgot password?</a></div>
    <button type="submit" class="btn-submit" id="submit-btn">Sign in</button>
  </form>
  <a href="workspace.html" class="guest-link">Continue without account →</a>
  <div class="form-terms">By continuing you agree to our <a href="#">Terms</a> and <a href="#">Privacy Policy</a>.</div>
</div>
<script type="module" src="login.js"></script>
</body>
</html>
